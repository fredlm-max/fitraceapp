<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0a0a08" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="APEX" />

    <!-- Apple touch icons (PNG requis par iOS) -->
    <link rel="apple-touch-icon" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-128.png" />

    <!-- Favicon (logo APEX) -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png" />

    <!-- SEO / Social -->
    <meta name="description" content="APEX — Ton entraînement HYROX s'adapte à ton état chaque jour. Score de préparation, séance décidée par l'IA, zones FC personnalisées." />
    <meta property="og:title" content="APEX Performance — Entraîne. Récupère. Progresse." />
    <meta property="og:description" content="Ton corps change chaque jour, ton entraînement aussi. Un coach IA qui s'adapte à toi." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fitrace-lemon.vercel.app/" />
    <meta property="og:image" content="https://fitrace-lemon.vercel.app/apex-logo.png" />
    <meta property="og:image:width" content="1254" />
    <meta property="og:image:height" content="1254" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="APEX Performance — Entraîne. Récupère. Progresse." />
    <meta name="twitter:description" content="Ton corps change chaque jour, ton entraînement aussi. Un coach IA qui s'adapte à toi." />
    <meta name="twitter:image" content="https://fitrace-lemon.vercel.app/apex-logo.png" />

    <title>APEX Performance — Coach HYROX IA</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Enregistrement Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[SW] Enregistré:', reg.scope))
            .catch(err => console.warn('[SW] Échec:', err));
        });
      }
    </script>
  </body>
</html>
